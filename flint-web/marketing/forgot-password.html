<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Flint</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --text-primary: #f5f5f5;
      --text-secondary: #737373;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --input-bg: #161616;
      --input-border: #262626;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; transition: color 150ms ease; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .split-layout { display: flex; width: 100%; height: 100%; }

    .panel-left {
      flex: 1;
      background: #0d0d0d;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem;
      overflow: hidden;
    }

    /* Abstract single beam of light */
    .ai-background {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #050505;
      z-index: 1;
    }
    .beam {
      position: absolute;
      top: -50%; left: 50%;
      width: 2px; height: 200%;
      background: linear-gradient(180deg, rgba(124,58,237,0) 0%, rgba(124,58,237,1) 50%, rgba(124,58,237,0) 100%);
      box-shadow: 0 0 40px 10px rgba(124,58,237,0.4);
      transform: rotate(35deg);
      z-index: 2;
    }

    .panel-right {
      flex: 1;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border-left: 1px solid var(--border);
    }

    .form-container { width: 100%; max-width: 400px; position: relative; }

    .back-link { position: absolute; top: -40px; left: 0; font-size: 0.875rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .back-link:hover { color: var(--text-primary); text-decoration: none; }
    .back-link svg { width: 16px; height: 16px; }

    .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 2rem; }
    .logo svg { width: 24px; height: 24px; fill: var(--accent); }

    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    p.subheading { color: var(--text-secondary); margin-bottom: 2.5rem; line-height: 1.5; }

    .input-group { margin-bottom: 1.5rem; }
    .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .input-group input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-mono);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      transition: all 150ms ease;
      outline: none;
    }
    .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2); }

    .btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 150ms ease;
      cursor: pointer;
      border: none;
      outline: none;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background-color: var(--accent); color: white; }
    .btn-primary:hover { background-color: var(--accent-hover); }

    /* Success State */
    .success-state { display: none; text-align: center; }
    .success-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(124,58,237,0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }

    @media (max-width: 900px) {
      .panel-left { display: none; }
    }
  </style>
</head>
<body>
  <div class="split-layout">
    <!-- Left Panel -->
    <div class="panel-left" aria-label="Abstract dark background, single beam of violet light cutting through black fog, long exposure style, minimalist, deep space atmosphere, ultra high resolution, cinematic">
      <div class="ai-background"></div>
      <div class="beam"></div>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
      <div class="form-container" id="form-container">
        <a href="login.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to login
        </a>

        <div class="logo">
          <svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
            <polygon points="0,100 40,0 80,0 40,50 65,50 25,120 35,70 10,70" />
          </svg>
          flint
        </div>

        <h1>Reset your password.</h1>
        <p class="subheading">Enter your email and we will send you a reset link.</p>

        <form onsubmit="handleReset(event)">
          <div class="input-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="developer@example.com" required>
          </div>
          
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>
      </div>

      <!-- Success State -->
      <div class="form-container success-state" id="success-container">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h1>Check your email</h1>
        <p class="subheading">We sent a reset link to <strong id="sent-email" style="color:var(--text-primary);"></strong>. Check your spam folder if you don't see it.</p>
        
        <p style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:2rem;">
          Didn't receive the email? <button onclick="resend()" style="background:none; color:var(--accent); font-weight:600; cursor:pointer;">Click to resend</button>
        </p>

        <a href="login.html" class="btn btn-primary" style="text-decoration:none;">Back to login</a>
      </div>
    </div>
  </div>

  <script>
    function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success-container').style.display = 'block';
      document.getElementById('sent-email').textContent = email;
    }

    function resend() {
      alert('Reset link resent!');
    }
  </script>
</body>
</html>
