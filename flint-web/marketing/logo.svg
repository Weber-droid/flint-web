<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background: #0a0a0a;">
  <defs>
    <style>
      .text-light { fill: #f5f5f5; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -3px; }
      .text-dark { fill: #0a0a0a; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -3px; }
      .accent { fill: #7c3aed; }
    </style>
  </defs>

  <text x="100" y="50" fill="#737373" font-family="monospace" font-size="14">Icon Only</text>
  <g id="icon-only" transform="translate(100, 80)">
    <!-- Sharp F shape acting as a spark -->
    <polygon points="0,100 40,0 80,0 40,50 65,50 25,120 35,70 10,70" class="accent"/>
  </g>

  <text x="100" y="250" fill="#737373" font-family="monospace" font-size="14">Wordmark Only (Light)</text>
  <g id="wordmark-only-light" transform="translate(100, 280)">
    <text x="0" y="70" class="text-light">flint</text>
  </g>

  <text x="400" y="250" fill="#737373" font-family="monospace" font-size="14">Wordmark Only (Dark)</text>
  <g id="wordmark-only-dark" transform="translate(400, 280)">
    <rect x="-20" y="-20" width="220" height="120" fill="#f5f5f5" rx="8" />
    <text x="0" y="70" class="text-dark">flint</text>
  </g>

  <text x="100" y="450" fill="#737373" font-family="monospace" font-size="14">Primary Logo (Light)</text>
  <g id="primary-logo-light" transform="translate(100, 480)">
    <polygon points="0,70 28,0 56,0 28,35 45,35 17,84 24,49 7,49" class="accent"/>
    <text x="70" y="65" class="text-light">flint</text>
  </g>

  <text x="400" y="450" fill="#737373" font-family="monospace" font-size="14">Primary Logo (Dark)</text>
  <g id="primary-logo-dark" transform="translate(400, 480)">
    <rect x="-20" y="-20" width="280" height="120" fill="#f5f5f5" rx="8" />
    <polygon points="0,70 28,0 56,0 28,35 45,35 17,84 24,49 7,49" class="accent"/>
    <text x="70" y="65" class="text-dark">flint</text>
  </g>
</svg>
